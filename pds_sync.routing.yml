pds_sync.settings:
  path: '/admin/config/services/pdssettings'
  defaults:
    _title: 'pds_sync Settings'
    _form: 'Drupal\pds_sync\Form\SettingsForm'
  requirements:
    _permission: 'administer site configuration'

pds_sync.dashboard:
  path: '/pds-sync'
  defaults:
    _controller: '\Drupal\pds_sync\Controller\PdsSyncController::dashboardShell'
    _title: 'PDS Sync Dashboard'
  requirements:
    _permission: 'administer pds sync'

pds_sync.drupal_view:
  path: '/pds-sync/drupal-view'
  defaults:
    _controller: '\Drupal\pds_sync\Controller\PdsSyncController::drupalView'
  requirements:
    _permission: 'administer pds sync'

pds_sync.pds_view:
  path: '/pds-sync/pds-view'
  defaults:
    _controller: '\Drupal\pds_sync\Controller\PdsSyncController::pdsView'
  requirements:
    _permission: 'administer pds sync'
    
pds_sync.logout:
  path: '/pds-sync/logout'
  defaults:
    _title: 'PDS Logout'
    _controller: '\Drupal\pds_sync\Controller\PdsSyncController::logout'
  requirements:
    _permission: 'administer pds sync'

pds_sync.update:
  path: '/pds-sync/update/{rkey}'
  defaults:
    _title: 'PDS update'
    _controller: '\Drupal\pds_sync\Controller\PdsSyncController::update'
  requirements:
    _permission: 'administer pds sync'

pds_sync.delete:
  path: '/pds-sync/delete/{rkey}'
  defaults:
    _title: 'PDS delete'
    _controller: '\Drupal\pds_sync\Controller\PdsSyncController::delete'
  requirements:
    _permission: 'administer pds sync'
  methods: [DELETE]
